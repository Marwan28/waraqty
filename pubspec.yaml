name: waraqty
description: "Waraqty - Arabic worksheet and exam builder for teachers."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  lucide_icons_flutter: ^3.1.14
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.5
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.8
  go_router: ^17.2.3
  smooth_page_indicator: ^2.0.1
  pdf: ^3.12.0
  printing: ^5.14.3
  google_mobile_ads: ^9.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7


flutter:
  uses-material-design: true

  assets:
    - assets/images/branding/
  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-Thin.ttf
          weight: 100
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-Bold.ttf
          weight: 700


flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/branding/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#0F5B5B"
  adaptive_icon_foreground: assets/images/branding/splash_logo.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F5B5B"
  image: assets/images/branding/splash_logo.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#0F5B5B"
    image: assets/images/branding/splash_logo.png
    icon_background_color: "#0F5B5B"
