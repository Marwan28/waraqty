name: waraqty
description: "Waraqty - Arabic worksheet and exam builder for teachers."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7


flutter:
  uses-material-design: true

  assets:
    - assets/images/branding/


  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/branding/app_icon.png
  adaptive_icon_background: "#1F6F5B"
  adaptive_icon_foreground: assets/images/branding/app_icon.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#1F6F5B"
  image: assets/images/branding/splash_logo.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#1F6F5B"
    image: assets/images/branding/splash_logo.png
    icon_background_color: "#1F6F5B"
